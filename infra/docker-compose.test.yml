name: giper-pm-test

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: giper-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: giper_pm_test
      POSTGRES_USER: giper
      POSTGRES_PASSWORD: giper
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    tmpfs:
      # Run the test DB in tmpfs so each suite gets a clean, fast disk.
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giper -d giper_pm_test"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
