name: giper-pm

services:
  postgres:
    image: postgres:16-alpine
    container_name: giper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: giper_pm
      POSTGRES_USER: giper
      POSTGRES_PASSWORD: giper
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - giper_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giper -d giper_pm"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: giper-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - giper_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  giper_postgres_data:
  giper_redis_data:
