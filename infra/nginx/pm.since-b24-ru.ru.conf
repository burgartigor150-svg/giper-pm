# Host nginx vhost for giper-pm.
# Lives at /etc/nginx/sites-enabled/pm.since-b24-ru.ru.conf on myserver.
#
# Upstream ports:
#   web (Next.js):  127.0.0.1:3110  (docker compose maps :3000 → 127.0.0.1:3110)
#   ws  (uWS fanout): 127.0.0.1:3111  (docker compose maps :3001 → 127.0.0.1:3111)
#
# WebSocket path: /ws → ws upstream, with Upgrade/Connection headers.
# Everything else → web upstream.
#
# TLS is provisioned by certbot --nginx; the listen 443 + ssl_certificate
# stanzas below get added by certbot when you run:
#   sudo certbot --nginx -d pm.since-b24-ru.ru
# Keep the http→https redirect block at the bottom; certbot edits this file
# in place but does NOT clobber custom locations.

upstream giper_pm_web {
    server 127.0.0.1:3110;
    keepalive 32;
}

upstream giper_pm_ws {
    server 127.0.0.1:3111;
    keepalive 16;
}

server {
    server_name pm.since-b24-ru.ru;

    # Allow large attachment uploads (matches MinIO defaults).
    client_max_body_size 100M;

    # WebSocket fanout — /ws/* goes to apps/ws.
    # Strip nothing: apps/ws routes /ws and /publish at the root.
    location /ws {
        proxy_pass http://giper_pm_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived connections — disable buffering, big timeouts.
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else → Next.js.
    location / {
        proxy_pass http://giper_pm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    access_log /var/log/nginx/giper-pm-access.log;
    error_log  /var/log/nginx/giper-pm-error.log warn;

    listen 80;
    # certbot will add `listen 443 ssl;` and ssl_certificate lines below.
}
