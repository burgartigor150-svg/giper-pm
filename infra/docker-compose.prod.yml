# Production stack for giper-pm. Lives on the deploy host (myserver).
#
# This server hosts many other projects, so:
#   - we never bind to 80/443 (host nginx fronts everything)
#   - postgres/redis/minio are docker-network-only (no host port-bindings)
#   - web and ws are bound to 127.0.0.1 on offset ports so only the host
#     nginx (or local curl) can reach them
#
# Host ports used:
#   127.0.0.1:3110 → web   (Next.js, container :3000)
#   127.0.0.1:3111 → ws    (uWebSockets, container :3001)
#
# Secrets: every $VAR below is read from /opt/giper-pm/.env on the host.
# Never check that file in.

name: giper-pm

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-giper_pm}
      POSTGRES_USER: ${POSTGRES_USER:-giper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Internal docker network only. The host already runs other postgres
    # instances on :5432 and various container ports — we stay isolated.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-giper} -d ${POSTGRES_DB:-giper_pm}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    # Bind to host loopback on a non-default port so that host-network
    # services (livekit, livekit-egress) can reach this exact instance.
    # The host already runs another Redis on :6379 — using :6380 keeps
    # both alive without conflict and prevents the egress split-brain
    # where livekit and egress point at different Redis databases.
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - minio_data:/data
    # Internal-only. Attachment downloads go through the web container
    # via /api/attachments/*, never directly to MinIO.
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY}; do
          sleep 1
        done
        mc mb -p local/${STORAGE_BUCKET:-attachments} || true
    restart: "no"

  # One-shot Prisma migrator. Runs once per deploy before web starts;
  # idempotent because `migrate deploy` skips already-applied migrations.
  # web depends on service_completed_successfully so a failed migration
  # blocks the new web from coming up — old web keeps serving traffic
  # until you fix the migration.
  migrate:
    image: ghcr.io/${GHCR_OWNER}/giper-migrate:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-giper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-giper_pm}
    restart: "no"

  web:
    image: ghcr.io/${GHCR_OWNER}/giper-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Loopback-only host binding — host nginx is the public entrypoint.
    ports:
      - "127.0.0.1:3110:3000"
    # Allow the container to reach the host's Ollama on 127.0.0.1:11434.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-giper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-giper_pm}
      REDIS_URL: redis://redis:6379

      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${PUBLIC_BASE_URL}
      AUTH_TRUST_HOST: 'true'

      # Bitrix24
      BITRIX24_WEBHOOK_URL: ${BITRIX24_WEBHOOK_URL}
      BITRIX24_INBOUND_SECRET: ${BITRIX24_INBOUND_SECRET}
      # Comma-separated department ids whose members are auto-activated on
      # every sync. Empty/unset → manual activation only.
      BITRIX24_ACTIVE_DEPARTMENTS: ${BITRIX24_ACTIVE_DEPARTMENTS:-}

      # Realtime
      WS_AUTH_SECRET: ${WS_AUTH_SECRET}
      WS_PUBLISH_SECRET: ${WS_PUBLISH_SECRET}
      WS_PUBLISH_URL: http://ws:3001/publish
      NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL}

      # AES-256-GCM master key for personal Telegram bot tokens. Must
      # match the same value in the tg-bot service below.
      TG_TOKEN_ENC_KEY: ${TG_TOKEN_ENC_KEY}
      # api.telegram.org is RKN-blocked on the .ru host. Tunnel through
      # the existing xray HTTP proxy on the host (gparser-xray service).
      TG_PROXY_URL: ${TG_PROXY_URL:-http://host.docker.internal:10829}

      # GitHub webhook
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}

      # S3-compatible storage (MinIO in this stack)
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-attachments}
      STORAGE_FORCE_PATH_STYLE: '1'

      # Cron secret (used by /api/cron/bitrix24)
      CRON_SECRET: ${CRON_SECRET}

      # Local LLM (Ollama on host, GPU 1) for AI chat-harvest analysis.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}

      # LiveKit (video meetings). API key/secret are shared with the
      # livekit + livekit-egress + transcribe-worker services. The
      # public WSS URL is what the browser uses to connect.
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_API_URL: http://host.docker.internal:7880
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL}

      # WhisperX HTTP server (T4 GPU). web doesn't transcribe directly
      # but server actions can probe /health.
      WHISPERX_BASE_URL: ${WHISPERX_BASE_URL:-http://host.docker.internal:8771}

  ws:
    image: ghcr.io/${GHCR_OWNER}/giper-ws:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3111:3001"
    environment:
      NODE_ENV: production
      WS_PORT: 3001
      WS_HOST: 0.0.0.0
      WS_AUTH_SECRET: ${WS_AUTH_SECRET}
      WS_PUBLISH_SECRET: ${WS_PUBLISH_SECRET}

  # Multi-bot runner: long-polls every UserTelegramBot row where
  # isActive=true. Each PM connects their personal BotFather bot via
  # the giper-pm web UI (Интеграции → Telegram). Tokens live AES-256-GCM
  # encrypted in Postgres; this container decrypts at boot and on the
  # `tg:bots:reload` Redis pub/sub event.
  tg-bot:
    image: ghcr.io/${GHCR_OWNER}/giper-tg-bot:${IMAGE_TAG:-latest}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-giper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-giper_pm}
      REDIS_URL: redis://redis:6379
      TG_TOKEN_ENC_KEY: ${TG_TOKEN_ENC_KEY}
      # Same proxy as web — for grammY long-poll and Telegram CDN downloads.
      TG_PROXY_URL: ${TG_PROXY_URL:-http://host.docker.internal:10829}
      # Used in /harvest reply to deep-link the PM into the web UI.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      # MinIO storage (used to upload Telegram files attached to AI-created tasks).
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-attachments}
      STORAGE_FORCE_PATH_STYLE: '1'

  # ---------------------------------------------------------------------
  # Video meetings stack: LiveKit SFU + composite recording + WhisperX
  # transcription. Recording lands in MinIO under meetings/<id>/...,
  # tg-bot's downloadFiles handler doesn't touch it. Transcription is
  # consumed by transcribe-worker (separate service below).
  # ---------------------------------------------------------------------

  # LiveKit OSS SFU. Front-ended by host nginx at /livekit/* (WSS).
  # WebRTC media uses UDP 50000-60000 directly to clients (network_mode
  # host required for the UDP range to be reachable without per-port
  # docker port mapping; UFW must allow that range).
  #
  # All config via LIVEKIT_CONFIG env (yaml body) — KEY:SECRET map is
  # tricky to pass as CLI flag; CLI flags for webhook.* changed across
  # versions, env-yaml is stable.
  livekit:
    # v1.9 introduces /rtc/v1 path that recent livekit-client (>= 2.10)
    # tries first; v1.8 caused 404 + retry + slow negotiation timeout.
    image: livekit/livekit-server:v1.9
    restart: unless-stopped
    network_mode: host
    depends_on:
      redis:
        condition: service_started
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 60000
          # Hard-pin to the only routable public IP of this host. Without
          # this LiveKit advertises every docker-bridge interface
          # (172.17.0.1, 172.30.0.1, …) plus IPv6, and the browser
          # spends seconds trying each one before falling back to TCP →
          # massive lag and dropped audio.
          node_ip: ${LIVEKIT_HOST_IP}
          use_external_ip: false
          interfaces:
            includes:
              - eno3np2
          # Public STUN servers help clients behind symmetric NAT find a
          # working candidate faster.
          stun_servers:
            - stun.l.google.com:19302
            - stun1.l.google.com:19302
        # MUST match the egress redis (compose service `redis` exposed
        # as 127.0.0.1:6380 on host). Otherwise PSRPC has split-brain
        # and StartEgress hangs with "no response from servers".
        redis:
          address: 127.0.0.1:6380
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - ${PUBLIC_BASE_URL}/api/livekit/webhook
        logging:
          level: info

  # LiveKit Egress: Chrome headless that joins the room as a viewer and
  # composites the video grid into MP4, streamed straight to MinIO.
  # Stays in giper-pm_default bridge so it can resolve `redis` and
  # `minio` by service name; reaches LiveKit (host network) via
  # host.docker.internal.
  livekit-egress:
    image: livekit/egress:v1.8
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN  # required by Chrome sandbox
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://host.docker.internal:7880
        redis:
          address: redis:6379
        s3:
          access_key: ${STORAGE_ACCESS_KEY}
          secret: ${STORAGE_SECRET_KEY}
          region: us-east-1
          bucket: ${STORAGE_BUCKET:-attachments}
          endpoint: http://minio:9000
          force_path_style: true
        log_level: info

  # Whisper ASR webservice (https://github.com/ahmetoner/whisper-asr-webservice).
  # Supports ASR_ENGINE=whisperx for diarization (needs HF_TOKEN). HTTP
  # POST /asr accepts audio + returns json. GPU 0 (T4) — does not fight
  # Qwen on GPU 1.
  whisperx:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    ports:
      - "127.0.0.1:8771:9000"
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-large-v3}
      ASR_ENGINE: whisperx
      ASR_DEVICE: cuda
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - whisper_cache:/root/.cache

  # Transcribe + AI-summary worker. Subscribes to Redis channels
  # 'meeting:transcribe' (LiveKit recording → text + tasks) and
  # 'tg:transcribe-voice' (TG voice messages → text appended to chat).
  transcribe-worker:
    image: ghcr.io/${GHCR_OWNER}/giper-transcribe-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-giper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-giper_pm}
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      WHISPERX_BASE_URL: ${WHISPERX_BASE_URL:-http://host.docker.internal:8771}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      HF_TOKEN: ${HF_TOKEN}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-attachments}
      STORAGE_FORCE_PATH_STYLE: '1'
      TG_TOKEN_ENC_KEY: ${TG_TOKEN_ENC_KEY}
      # TG voice transcription path uses the same xray proxy as the bot
      # (api.telegram.org is RKN-blocked).
      TG_PROXY_URL: ${TG_PROXY_URL:-http://host.docker.internal:10829}

volumes:
  postgres_data:
  redis_data:
  minio_data:
  whisper_cache:
